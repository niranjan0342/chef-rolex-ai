<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chef Rolex</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="app-container">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Past Sessions</h3>
                <button class="new-chat-btn" id="newChatSidebarBtn" aria-label="New chat"><i
                        class="ti ti-plus"></i></button>
            </div>
            <div class="session-list" id="sessionList">
                <div style="text-align:center; padding:20px; font-size:12px; color:#888;">Log in to see past sessions
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="loginBtnSidebar" class="login-btn">Login / Register</button>
                <div id="userInfo"
                    style="display:none; width:100%; display:flex; justify-content:space-between; align-items:center;">
                    <span id="userNameDisplay" style="font-weight:500; color:#2C2C2A;"></span>
                    <button id="logoutBtn" class="logout-btn" title="Logout"><i class="ti ti-logout"></i></button>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="header-icon"><img src="logo.png"
                        style="width:100%;height:100%;object-fit:contain;border-radius:50%;"></div>
                <div class="header-text">
                    <p class="header-title">Chef Rolex</p>
                    <p class="header-subtitle">Your recipe assistant</p>
                </div>
                <button class="new-chat-btn" id="newChatBtn" aria-label="New chat"><i class="ti ti-plus"></i></button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="bot-row">
                    <div class="bot-avatar"><img src="logo.png"
                            style="width:100%;height:100%;object-fit:contain;border-radius:50%;"></div>
                    <div>
                        <div class="bot-bubble">Hi! I'm Chef Rolex. Tell me a dish and I'll walk you through it.</div>
                    </div>
                </div>
            </div>

            <div class="chat-input-wrap">
                <div class="chat-input">
                    <button class="icon-btn" id="micBtn" aria-label="Voice input"><i
                            class="ti ti-microphone"></i></button>
                    <input type="text" id="userInput" placeholder="Ask for a recipe..." />
                    <button class="icon-btn send-btn" id="sendBtn" aria-label="Send"><i
                            class="ti ti-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn"><i class="ti ti-x"></i></button>
            <h2 class="modal-title" id="modalTitle">Login</h2>

            <div class="input-group">
                <input type="text" id="authUsername" placeholder="Username">
            </div>
            <div class="input-group" id="emailGroup" style="display:none;">
                <input type="email" id="authEmail" placeholder="Email">
            </div>
            <div class="input-group">
                <input type="password" id="authPassword" placeholder="Password">
            </div>
            <button class="modal-btn" id="authSubmitBtn">Login</button>

            <div class="toggle-auth">
                <span id="authToggleText">Don't have an account? </span>
                <a id="authToggleLink">Register</a>
            </div>
            <div id="authError" style="color:red; font-size:12px; text-align:center; margin-top:10px;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="./js/main.js"></script>

</body>

</html>
